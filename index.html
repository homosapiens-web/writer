<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Tracker Pro - 專業寫作編輯器</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
:root {
    --primary: #4F46E5;
    --primary-hover: #4338CA;
    --bg-color: #F3F4F6;
    --sidebar-bg: #FFFFFF;
    --toolbar-bg: rgba(255, 255, 255, 0.95);
    --text-main: #1F2937;
    --text-muted: #6B7280;
    --border-color: #E5E7EB;
    --page-bg: #FFFFFF;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    --radius: 8px;
    --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    background-color: var(--bg-color);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
}

.app-container {
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* Toolbar */
.toolbar {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    background: var(--toolbar-bg);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-color);
    box-shadow: var(--shadow-sm);
    z-index: 10;
    flex-wrap: wrap;
    gap: 8px;
}

.toolbar-group {
    display: flex;
    align-items: center;
    gap: 4px;
}

.toolbar-divider {
    width: 1px;
    height: 24px;
    background-color: var(--border-color);
    margin: 0 8px;
}

.toolbar-spacer {
    flex-grow: 1;
}

.tool-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    width: 32px;
    height: 32px;
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 15px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
}

.tool-btn:hover {
    background-color: var(--border-color);
    color: var(--text-main);
}

.tool-btn.active {
    background-color: var(--primary);
    color: white;
}

.tool-select {
    padding: 6px 8px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background-color: white;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-main);
    outline: none;
    cursor: pointer;
    transition: var(--transition);
}

.tool-select:hover {
    border-color: var(--text-muted);
}

.color-picker-group {
    position: relative;
    padding: 0 4px;
}

.color-picker {
    width: 26px;
    height: 26px;
    padding: 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    background: transparent;
}

.color-picker::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker::-webkit-color-swatch { border: 1px solid var(--border-color); border-radius: 4px; }

.color-grid {
    display: flex;
    gap: 6px;
    margin-left: 8px;
}

.color-swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1);
    cursor: pointer;
    transition: var(--transition);
}
.color-swatch:hover {
    transform: scale(1.2);
}

.action-btn {
    background-color: var(--primary);
    color: white;
    border: 1px solid transparent;
    padding: 8px 16px;
    border-radius: var(--radius);
    font-weight: 500;
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
}

.action-btn:hover {
    background-color: var(--primary-hover);
    box-shadow: var(--shadow-md);
}

.action-btn.outline {
    background-color: transparent;
    color: var(--primary);
    border-color: var(--primary);
}
.action-btn.outline:hover {
    background-color: rgba(79, 70, 229, 0.1);
}

.action-btn.full-width {
    width: 100%;
    margin-bottom: 8px;
}

.btn-export-pdf { background-color: #e74c3c; }
.btn-export-pdf:hover { background-color: #c0392b; }
.btn-export-word { background-color: #2980b9; }
.btn-export-word:hover { background-color: #2471a3; }

/* Main Content area */
.main-content {
    display: flex;
    flex: 1;
    overflow: hidden;
}

/* Sidebars */
.sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border-color);
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
}
.sidebar::-webkit-scrollbar { width: 6px; }
.sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

.right-sidebar {
    border-right: none;
    border-left: 1px solid var(--border-color);
}

.sidebar-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Goals & Progress */
.goal-input {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}
.goal-input input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius);
    font-size: 16px;
    text-align: right;
    outline: none;
    transition: var(--transition);
}
.goal-input input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
}

.progress-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.progress-circular {
    position: relative;
    width: 140px;
    height: 140px;
}
.progress-circular svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.circle-bg { fill: none; stroke: #f3f4f6; stroke-width: 3; }
.circle-progress {
    fill: none;
    stroke: var(--primary);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke-dasharray 0.8s ease;
}

.progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 700;
    color: var(--primary);
}

.progress-bar-container {
    width: 100%;
    height: 8px;
    background-color: #f3f4f6;
    border-radius: 4px;
    overflow: hidden;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #818cf8, var(--primary));
    border-radius: 4px;
    transition: width 0.5s ease;
}

/* Timer */
.timer-display {
    font-family: 'Courier New', Courier, monospace;
    font-size: 38px;
    font-weight: 700;
    text-align: center;
    color: var(--text-main);
    margin-bottom: 16px;
    background: #f8fafc;
    padding: 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border-color);
    letter-spacing: 2px;
}
.timer-controls {
    display: flex;
    justify-content: center;
    gap: 16px;
}
.btn-timer {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border-color);
    background-color: white;
    color: var(--text-main);
    font-size: 16px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
}
.btn-timer:hover {
    background-color: #f8fafc;
    transform: translateY(-2px);
    box-shadow: var(--shadow-sm);
}
#btnStartTimer { color: #10B981; }
#btnPauseTimer { color: #F59E0B; }
#btnResetTimer { color: #EF4444; }

/* Stats */
.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.stat-box {
    background: #f8fafc;
    border: 1px solid var(--border-color);
    padding: 16px 12px;
    border-radius: var(--radius);
    text-align: center;
    transition: var(--transition);
}
.stat-box:hover {
    border-color: #cbd5e1;
    background: white;
}
.stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
}
.stat-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary);
}

/* Editor Area */
.editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background-color: #e2e8f0; 
    position: relative;
}

.tabs-bar {
    display: flex;
    background-color: var(--sidebar-bg);
    border-bottom: 1px solid var(--border-color);
    padding: 0 16px;
    overflow-x: auto;
}
.tabs-bar::-webkit-scrollbar { height: 0px; }

.tab-btn {
    padding: 12px 24px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 8px;
}
.tab-btn:hover {
    color: var(--text-main);
    background: #f8fafc;
}
.tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    background: white;
}
.add-tab-btn {
    padding: 12px 16px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: var(--transition);
}
.add-tab-btn:hover { color: var(--primary); }

.page-controls {
    padding: 8px 24px;
    background-color: rgba(255,255,255,0.5);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-color);
}
.page-controls select {
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border-color);
    background: white;
}

.editor-scroll-container {
    flex: 1;
    overflow-y: auto;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}
.editor-scroll-container::-webkit-scrollbar { width: 8px; }
.editor-scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

.editor-page {
    background-color: var(--page-bg);
    box-shadow: var(--shadow-lg);
    border-radius: 4px;
    padding: 96px; /* standard document padding */
    outline: none;
    line-height: 1.8;
    color: #111827;
    transition: width 0.3s ease, min-height 0.3s ease;
}
.editor-page.size-a4 { width: 794px; min-height: 1123px; }
.editor-page.size-letter { width: 816px; min-height: 1056px; }
.editor-page.size-responsive {
    width: 100%;
    max-width: 1200px;
    min-height: calc(100vh - 200px);
    border-radius: var(--radius);
    padding: 60px;
}

/* Editor content typography */
.editor-page p { margin-bottom: 1.2em; }
.editor-page h1 { font-size: 2em; margin-top: 1.5em; margin-bottom: 0.8em; font-weight: 700; }
.editor-page h2 { font-size: 1.5em; margin-top: 1.5em; margin-bottom: 0.8em; font-weight: 600; }
.editor-page h3 { font-size: 1.25em; margin-top: 1.2em; margin-bottom: 0.6em; font-weight: 600; }
.editor-page ul, .editor-page ol { margin-left: 2em; margin-bottom: 1.2em; }

/* TOC */
.toc-container {
    font-size: 14px;
    line-height: 2;
}
.toc-item {
    cursor: pointer;
    color: var(--text-muted);
    transition: var(--transition);
    text-overflow: ellipsis;
    overflow: hidden;
    white-space: nowrap;
    padding: 4px 8px;
    border-radius: 4px;
}
.toc-item:hover {
    color: var(--primary);
    background-color: #f8fafc;
}
.toc-h1 { margin-left: 0; font-weight: 600; color: var(--text-main); }
.toc-h2 { margin-left: 16px; }
.toc-h3 { margin-left: 32px; }
.toc-h4 { margin-left: 48px; }
.toc-empty {
    color: #9ca3af;
    font-style: italic;
    text-align: center;
    padding: 40px 0;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(17, 24, 39, 0.9);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 1000;
}
.toast.show {
    transform: translateX(-50%) translateY(0);
}

/* Responsive */
@media (max-width: 1200px) {
    .right-sidebar { width: 240px; min-width: 240px; }
}
@media (max-width: 992px) {
    .right-sidebar { display: none; }
}
@media (max-width: 768px) {
    .left-sidebar { display: none; }
    .editor-page { padding: 40px 20px; }
}
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Toolbar -->
        <header class="toolbar">
            <div class="toolbar-group">
                <button class="tool-btn" title="上一步 (Ctrl+Z)" onclick="execCmd('undo')"><i class="fas fa-undo"></i></button>
                <button class="tool-btn" title="下一步 (Ctrl+Y)" onclick="execCmd('redo')"><i class="fas fa-redo"></i></button>
            </div>
            <div class="toolbar-divider"></div>
            
            <div class="toolbar-group">
                <select class="tool-select" id="fontName" title="字型" onchange="execCmd('fontName', this.value)">
                    <option value="Arial">Arial</option>
                    <option value="Inter">Inter</option>
                    <option value="'Times New Roman'">Times New Roman</option>
                    <option value="'Noto Sans TC'">思源黑體</option>
                    <option value="微軟正黑體">微軟正黑體</option>
                    <option value="標楷體">標楷體</option>
                </select>
                
                <select class="tool-select" id="fontSize" title="字體大小" onchange="execCmd('fontSize', this.value)">
                    <option value="1">10pt (極小)</option>
                    <option value="2">13pt (小)</option>
                    <option value="3" selected>16pt (標準)</option>
                    <option value="4">18pt (中)</option>
                    <option value="5">24pt (大)</option>
                    <option value="6">32pt (極大)</option>
                    <option value="7">48pt (標題)</option>
                </select>
            </div>
            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <select class="tool-select" id="formatBlock" title="段落樣式" onchange="execCmd('formatBlock', this.value)">
                    <option value="P">段落 (內文)</option>
                    <option value="H1">標題 1 (H1)</option>
                    <option value="H2">標題 2 (H2)</option>
                    <option value="H3">標題 3 (H3)</option>
                    <option value="H4">標題 4 (H4)</option>
                </select>
            </div>
            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <button class="tool-btn" title="粗體" onclick="execCmd('bold')" id="btn-bold"><i class="fas fa-bold"></i></button>
                <button class="tool-btn" title="斜體" onclick="execCmd('italic')" id="btn-italic"><i class="fas fa-italic"></i></button>
                <button class="tool-btn" title="底線" onclick="execCmd('underline')" id="btn-underline"><i class="fas fa-underline"></i></button>
                <button class="tool-btn" title="刪除線" onclick="execCmd('strikeThrough')" id="btn-strikethrough"><i class="fas fa-strikethrough"></i></button>
            </div>
            <div class="toolbar-divider"></div>

            <div class="toolbar-group color-picker-group">
                <i class="fas fa-font" style="color: var(--text-muted); font-size: 14px; margin-right: 4px;"></i>
                <input type="color" class="color-picker" id="foreColor" onchange="execCmd('foreColor', this.value)" oninput="execCmd('foreColor', this.value)" title="光譜選色器">
                <div class="color-grid" title="快速色格">
                    <button class="color-swatch" style="background-color: #1F2937;" onclick="execCmd('foreColor', '#1F2937')"></button>
                    <button class="color-swatch" style="background-color: #EF4444;" onclick="execCmd('foreColor', '#EF4444')"></button>
                    <button class="color-swatch" style="background-color: #3B82F6;" onclick="execCmd('foreColor', '#3B82F6')"></button>
                    <button class="color-swatch" style="background-color: #10B981;" onclick="execCmd('foreColor', '#10B981')"></button>
                    <button class="color-swatch" style="background-color: #F59E0B;" onclick="execCmd('foreColor', '#F59E0B')"></button>
                </div>
            </div>
            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <button class="tool-btn" title="置左對齊" onclick="execCmd('justifyLeft')"><i class="fas fa-align-left"></i></button>
                <button class="tool-btn" title="置中對齊" onclick="execCmd('justifyCenter')"><i class="fas fa-align-center"></i></button>
                <button class="tool-btn" title="置右對齊" onclick="execCmd('justifyRight')"><i class="fas fa-align-right"></i></button>
            </div>
            <div class="toolbar-divider"></div>

            <div class="toolbar-group">
                <button class="tool-btn" title="減少縮排" onclick="execCmd('outdent')"><i class="fas fa-outdent"></i></button>
                <button class="tool-btn" title="增加縮排" onclick="execCmd('indent')"><i class="fas fa-indent"></i></button>
            </div>

            <div class="toolbar-spacer"></div>

            <div class="toolbar-group">
                <button class="action-btn" onclick="saveDocument()"><i class="fas fa-save"></i> 存檔</button>
            </div>
        </header>

        <!-- Main Content Layout -->
        <main class="main-content">
            <!-- Left Sidebar -->
            <aside class="sidebar left-sidebar">
                <div class="sidebar-section">
                    <h3><i class="fas fa-bullseye"></i> 寫作目標</h3>
                    <div class="goal-input">
                        <input type="number" id="wordGoal" value="1000" min="1" title="設定目標字數">
                        <span>字</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-circular">
                            <svg viewBox="0 0 36 36">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                                <path class="circle-progress" id="progressCircle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            </svg>
                            <div class="progress-text" id="progressPercentage">0%</div>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3><i class="fas fa-clock"></i> 計時器</h3>
                    <div class="timer-display" id="timerDisplay">00:00:00</div>
                    <div class="timer-controls">
                        <button class="btn-timer" id="btnStartTimer" title="開始" onclick="startTimer()"><i class="fas fa-play"></i></button>
                        <button class="btn-timer" id="btnPauseTimer" title="暫停" onclick="pauseTimer()"><i class="fas fa-pause"></i></button>
                        <button class="btn-timer" id="btnResetTimer" title="重置" onclick="resetTimer()"><i class="fas fa-stop"></i></button>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3><i class="fas fa-chart-bar"></i> 即時字數統計</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-label">包含標點</div>
                            <div class="stat-value" id="countWithPunc">0</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">不含標點</div>
                            <div class="stat-value" id="countWithoutPunc">0</div>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3><i class="fas fa-magic"></i> 快速工具</h3>
                    <button class="action-btn outline full-width" onclick="convertPunctuation()"><i class="fas fa-exchange-alt"></i> 半形轉全形</button>
                    <button class="action-btn outline full-width" onclick="copyAndFix()"><i class="fas fa-copy"></i> 複製全文</button>
                    <div style="height: 10px;"></div>
                    <button class="action-btn full-width btn-export-pdf" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> 匯出 PDF</button>
                    <button class="action-btn full-width btn-export-word" onclick="exportWord()"><i class="fas fa-file-word"></i> 匯出 Word</button>
                </div>
            </aside>

            <!-- Editor Center Area -->
            <div class="editor-area">
                <!-- Tab Bar -->
                <div class="tabs-bar" id="tabsBar">
                    <!-- Tabs will be generated by JS -->
                </div>

                <!-- Page Size Controls -->
                <div class="page-controls">
                    <label><i class="fas fa-file-alt"></i> 版面大小：</label>
                    <select id="pageSize" onchange="changePageSize(this.value)">
                        <option value="A4">A4 (預設)</option>
                        <option value="Letter">Letter</option>
                        <option value="Responsive">自適應 (滿版)</option>
                    </select>
                </div>

                <!-- Actual Editor Container -->
                <div class="editor-scroll-container">
                    <div class="editor-page size-a4" id="editor" contenteditable="true" spellcheck="true">
                        <h1>開始寫作之旅...</h1>
                        <p>在這裡輸入您的文字，支援 <strong>粗體</strong>、<em>斜體</em> 等文書處理功能。</p>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar (TOC) -->
            <aside class="sidebar right-sidebar">
                <div class="sidebar-section">
                    <h3><i class="fas fa-list-ul"></i> 文件目錄</h3>
                    <div class="toc-container" id="tocContainer">
                        <!-- TOC generated by JS -->
                        <div class="toc-empty">尚無標題</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    
    <!-- Notification Toast -->
    <div id="toast" class="toast">訊息</div>

    <script>
// Global State
let currentTabId = 'tab-' + Date.now();
let tabsData = {};
tabsData[currentTabId] = { title: '未命名文件', content: '<h1>開始寫作...</h1><p>在這裡輸入您的內容。</p>' };

// Timer State
let timerInterval;
let secondsElapsed = 0;
let isTimerRunning = false;

// DOM Elements
const editor = document.getElementById('editor');
const fontNameSelect = document.getElementById('fontName');
const fontSizeSelect = document.getElementById('fontSize');
const formatBlockSelect = document.getElementById('formatBlock');
const tabsBar = document.getElementById('tabsBar');

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    loadFromLocalStorage();
    renderTabs();
    loadTab(currentTabId);
    
    // Editor Event Listeners
    editor.addEventListener('input', () => {
        updateStats();
        updateTOC();
        autoSave();
    });
    
    editor.addEventListener('keyup', updateToolbarState);
    editor.addEventListener('mouseup', updateToolbarState);
    
    // Ensure clicks inside editor set focus
    editor.addEventListener('click', () => {
        if (document.activeElement !== editor) {
            editor.focus();
        }
    });

    // Initial updates
    updateStats();
    updateTOC();
    
    // Default to P (paragraph)
    document.execCommand('defaultParagraphSeparator', false, 'p');
});

// --- Editor Functions ---

function execCmd(command, value = null) {
    editor.focus();
    document.execCommand(command, false, value);
    updateToolbarState();
    updateStats();
    autoSave();
}

function updateToolbarState() {
    // Buttons state
    const buttons = ['bold', 'italic', 'underline', 'strikeThrough'];
    buttons.forEach(cmd => {
        const btn = document.getElementById(`btn-${cmd.toLowerCase()}`);
        if(btn) {
            if (document.queryCommandState(cmd)) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }
    });

    // Selects state (try-catch because some browsers don't support all queries)
    try {
        const fontName = document.queryCommandValue('fontName');
        if (fontName) {
            const cleanFontName = fontName.replace(/['"]/g, '');
            Array.from(fontNameSelect.options).forEach(opt => {
                if (opt.value.includes(cleanFontName) || cleanFontName.includes(opt.value)) {
                    fontNameSelect.value = opt.value;
                }
            });
        }
        
        const fontSize = document.queryCommandValue('fontSize');
        if (fontSize) {
            fontSizeSelect.value = fontSize;
        }

        const formatBlock = document.queryCommandValue('formatBlock');
        if (formatBlock) {
            let cleanFormat = formatBlock.toUpperCase();
            if (cleanFormat === 'DIV') cleanFormat = 'P'; // handle div as p
            formatBlockSelect.value = cleanFormat;
        }
    } catch (e) {}
}

// --- Stats & Progress ---

function updateStats() {
    const text = editor.innerText || '';
    
    // Calculate words
    // 1. English words
    const engWordsMatch = text.match(/[a-zA-Z0-9]+/g);
    const engWordsCount = engWordsMatch ? engWordsMatch.length : 0;
    
    // 2. Chinese characters
    const chiCharsMatch = text.match(/[\u4e00-\u9fa5]/g);
    const chiCharsCount = chiCharsMatch ? chiCharsMatch.length : 0;
    
    // 3. Punctuation
    const puncsMatch = text.match(/[。，、；：「」『』（）？！—…《》〈〉.,;:"'?!\-\[\]]/g);
    const puncsCount = puncsMatch ? puncsMatch.length : 0;

    const withoutPunc = engWordsCount + chiCharsCount;
    const withPunc = withoutPunc + puncsCount;

    document.getElementById('countWithoutPunc').innerText = withoutPunc;
    document.getElementById('countWithPunc').innerText = withPunc;

    // Progress
    const goalInput = document.getElementById('wordGoal');
    let goal = parseInt(goalInput.value) || 1;
    
    let percentage = Math.min(100, Math.round((withoutPunc / goal) * 100));
    
    document.getElementById('progressPercentage').innerText = `${percentage}%`;
    document.getElementById('progressBar').style.width = `${percentage}%`;
    
    const circle = document.getElementById('progressCircle');
    // Circle length is 100 in the dasharray logic
    circle.setAttribute('stroke-dasharray', `${percentage}, 100`);
}

document.getElementById('wordGoal').addEventListener('input', () => {
    updateStats();
    autoSave();
});

// --- Timer ---

function updateTimerDisplay() {
    const h = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
    const m = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
    const s = String(secondsElapsed % 60).padStart(2, '0');
    document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
}

function startTimer() {
    if (!isTimerRunning) {
        isTimerRunning = true;
        timerInterval = setInterval(() => {
            secondsElapsed++;
            updateTimerDisplay();
        }, 1000);
        showToast('計時器已啟動');
    }
}

function pauseTimer() {
    if(isTimerRunning) {
        isTimerRunning = false;
        clearInterval(timerInterval);
        showToast('計時器已暫停');
    }
}

function resetTimer() {
    isTimerRunning = false;
    clearInterval(timerInterval);
    secondsElapsed = 0;
    updateTimerDisplay();
    showToast('計時器已重置');
}

// --- TOC ---

function updateTOC() {
    const tocContainer = document.getElementById('tocContainer');
    const headings = editor.querySelectorAll('h1, h2, h3, h4');
    
    if (headings.length === 0) {
        tocContainer.innerHTML = '<div class="toc-empty">尚無標題</div>';
        return;
    }
    
    tocContainer.innerHTML = '';
    headings.forEach((heading, index) => {
        if (!heading.id) {
            heading.id = `heading-${index}`;
        }
        
        const level = heading.tagName.toLowerCase();
        const div = document.createElement('div');
        div.className = `toc-item toc-${level}`;
        div.innerText = heading.innerText || '無標題';
        div.title = div.innerText;
        div.onclick = () => {
            heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        tocContainer.appendChild(div);
    });
}

// --- Tabs & Storage ---

function renderTabs() {
    tabsBar.innerHTML = '';
    Object.keys(tabsData).forEach(id => {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${id === currentTabId ? 'active' : ''}`;
        
        btn.innerHTML = `<span>${tabsData[id].title}</span>`;
        
        // Context menu or double click to rename
        btn.ondblclick = () => {
            const newTitle = prompt('重新命名文件', tabsData[id].title);
            if (newTitle && newTitle.trim() !== '') {
                tabsData[id].title = newTitle.trim();
                renderTabs();
                autoSave();
            }
        };
        
        btn.onclick = () => switchTab(id);
        tabsBar.appendChild(btn);
    });
    
    const addBtn = document.createElement('button');
    addBtn.className = 'add-tab-btn';
    addBtn.innerHTML = '<i class="fas fa-plus"></i> 新增';
    addBtn.onclick = createNewTab;
    tabsBar.appendChild(addBtn);
}

function switchTab(id) {
    if (currentTabId === id) return;
    
    // Save current
    tabsData[currentTabId].content = editor.innerHTML;
    
    // Switch
    currentTabId = id;
    loadTab(id);
    renderTabs();
    autoSave();
}

function createNewTab() {
    const id = 'tab-' + Date.now();
    tabsData[id] = { title: '未命名文件', content: '<h1>新文件</h1><p><br></p>' };
    switchTab(id);
}

function loadTab(id) {
    if(!tabsData[id]) return;
    editor.innerHTML = tabsData[id].content;
    updateStats();
    updateTOC();
}

function saveDocument() {
    tabsData[currentTabId].content = editor.innerHTML;
    localStorage.setItem('wordTrackerData', JSON.stringify(tabsData));
    localStorage.setItem('wordTrackerCurrentTab', currentTabId);
    
    // Also save goal
    const goal = document.getElementById('wordGoal').value;
    localStorage.setItem('wordTrackerGoal', goal);
    
    showToast('✅ 檔案已成功存檔');
}

function autoSave() {
    tabsData[currentTabId].content = editor.innerHTML;
    localStorage.setItem('wordTrackerData', JSON.stringify(tabsData));
    localStorage.setItem('wordTrackerCurrentTab', currentTabId);
    localStorage.setItem('wordTrackerGoal', document.getElementById('wordGoal').value);
}

function loadFromLocalStorage() {
    try {
        const saved = localStorage.getItem('wordTrackerData');
        const savedTab = localStorage.getItem('wordTrackerCurrentTab');
        const savedGoal = localStorage.getItem('wordTrackerGoal');
        
        if (saved) {
            tabsData = JSON.parse(saved);
            if (savedTab && tabsData[savedTab]) {
                currentTabId = savedTab;
            } else {
                currentTabId = Object.keys(tabsData)[0];
            }
        }
        if (savedGoal) {
            document.getElementById('wordGoal').value = savedGoal;
        }
    } catch (e) {
        console.error('Failed to load storage', e);
    }
}

// --- Utilities ---

function changePageSize(size) {
    editor.className = `editor-page size-${size.toLowerCase()}`;
}

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

// Full/Half width conversion
function convertPunctuation() {
    // A mapping of half-width punctuation to full-width
    const map = {
        ',': '，', '.': '。', '?': '？', '!': '！', ':': '：', ';': '；',
        '(': '（', ')': '）', '[': '［', ']': '］'
    };
    
    // We walk the DOM and replace text in text nodes to avoid destroying HTML tags
    const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null, false);
    let node;
    while (node = walker.nextNode()) {
        let text = node.nodeValue;
        for (const [half, full] of Object.entries(map)) {
            text = text.split(half).join(full);
        }
        node.nodeValue = text;
    }
    
    updateStats();
    autoSave();
    showToast('轉換完成：半形標點已轉換為全形');
}

function copyAndFix() {
    const text = editor.innerText; // grabs plain text without HTML
    navigator.clipboard.writeText(text).then(() => {
        showToast('已複製純文本內容，可貼上至其他 AI 工具進行改錯字');
    }).catch(err => {
        showToast('複製失敗：' + err);
    });
}

// --- Exports ---

function exportPDF() {
    showToast('正在準備 PDF，請稍候...');
    
    // Clone editor content for export
    const element = document.createElement('div');
    element.innerHTML = editor.innerHTML;
    element.style.padding = '30px';
    element.style.fontFamily = getComputedStyle(editor).fontFamily;
    element.style.color = '#000';
    element.style.lineHeight = '1.6';
    
    const opt = {
        margin:       15,
        filename:     `${tabsData[currentTabId].title}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        showToast('PDF 匯出成功');
    }).catch(err => {
        showToast('PDF 匯出失敗');
        console.error(err);
    });
}

function exportWord() {
    showToast('正在準備 Word 檔案...');
    
    // Create a simple HTML document format that Word understands
    const content = `
    <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
    <head>
        <meta charset='utf-8'>
        <title>${tabsData[currentTabId].title}</title>
        <style>
            body { font-family: 'Arial', sans-serif; line-height: 1.6; }
            p { margin-bottom: 1em; }
            h1, h2, h3 { margin-top: 1.2em; margin-bottom: 0.5em; }
        </style>
    </head>
    <body>
        ${editor.innerHTML}
    </body>
    </html>
    `;
    
    const blob = new Blob(['\ufeff', content], {
        type: 'application/msword'
    });
    
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${tabsData[currentTabId].title}.doc`;
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    
    showToast('Word 檔案匯出成功');
}
    </script>
</body>
</html>
